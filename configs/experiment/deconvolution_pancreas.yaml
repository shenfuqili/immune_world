# Table 1 column + Table 2 cell-type F1: Pancreas synthetic bulk deconvolution.
# Expected overall F1 = 0.730 ± 0.019.
defaults:
  - main
  - _self_

phase: finetune
task: deconvolution
data:
  name: deconvolution_pancreas
  reference: pancreas
  cells_per_mixture: 500
  f1_threshold: 0.05
