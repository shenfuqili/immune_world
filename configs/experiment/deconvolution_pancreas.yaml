  overall_f1: 0.730
  overall_f1_std: 0.019
  per_type_f1:
    CD8_T: 0.812
    CD4_T: 0.789
    Tregs: 0.691
    B: 0.756
    NK: 0.741
    DC: 0.704
    Macrophages: 0.768
    Monocytes: 0.723
