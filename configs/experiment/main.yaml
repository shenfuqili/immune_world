# Primary result of the paper — four-task evaluation at default hparams (Table 1 / 2 / 5).
# Source: docs/project-context.md §8 (authoritative) + Sec. 2.1 / Sec. 4.6 / Table S3 †.
# Do NOT edit this file to trim batch/epoch/world_size for a faster run; `_smoke.yaml` exists
# for that.
defaults:
  - /model: base
  - /train: pretrain
  - _self_

seed: 42
precision: bf16
world_size: 4
wall_clock_hours: 72
gpu_hours: 288
hardware: NVIDIA A100 80GB (4x)

model:
  n_layers: 12               # §2.1 L217; Table S3 default († at L=12)
  d_model: 512               # §2.1 L217; Table S3 default († at d=512)
  n_heads: 8                 # §2.1 L217; Table S3 default († at H=8)
  n_genes: 2000              # §4.6 L688-L689
  alpha_init: 0.01           # Table S3 default († for temporal decay α)
  n_cancer_types: 7          # §2.1 L203
  n_cell_types: 8            # Table 2 deconvolution panel
  lambda_adv: 0.1            # §4.4 L654 gradient-reversal weight

pretrain:
  corpus:
    hca_immune: 5_200_000
    cellxgene_immune: 4_800_000
    geo_perturbseq: 2_400_000
    total: 12_400_000
  lr: 1.0e-4                 # §4.6 L690
  warmup_steps: 5000         # §4.6 L691 (linear warmup)
  scheduler: cosine
  lr_min: 1.0e-6             # §4.6 L691-L692
  epochs: 200
  batch_size: 512            # per GPU
  loss_weights:
    lambda_traj: 1.0
    lambda_recon: 0.5        # §4.6 L683
    lambda_pert: 0.3         # §4.6 L683

fine_tune:
  lr: 3.0e-4                 # §2.1 L221; Table S3 default (†)
  scheduler: cosine_annealing
  weight_decay: 0.01         # §2.1 L221
  batch_size: 256            # §2.1 L222
  early_stopping_patience: 10  # §2.1 L222-L223
  seeds: [42, 123, 456]      # §2.1 L224

data_splits:
  perturbation:  { strategy: perturbation_identity, ratio: [0.8, 0.1, 0.1] }
  trajectory:    { strategy: full_dataset_evaluation }
  icb:           { strategy: leave_one_cohort_out }
  deconvolution: { strategy: split_by_mixture, counts: [350, 50, 100] }

inference:
  attention_impl: flash_attention_2   # §2.8 L433
  peak_vram_gb: 6.2                   # Table 5
  throughput_cells_per_sec: 14_200    # Table 5

statistics:
  pearson_r_ci_method: paired_t           # Table S8
  auc_ci_method: DeLong                   # Table S8
  cbdir_dtw_ci_method: bootstrap_1000     # Table S8
  n_independent_replicates: 3             # §2.1 L224
