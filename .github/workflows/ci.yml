name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-type-test:
    runs-on: ubuntu-22.04
    strategy:
      matrix:
        python-version: ["3.11"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install (CPU-only; skip flash-attn)
        run: |
          python -m pip install --upgrade pip
          python -m pip install "torch>=2.3,<2.5" --index-url https://download.pytorch.org/whl/cpu
          python -m pip install -e ".[dev]"

      - name: Ruff
        run: python -m ruff check .

      - name: Black (check mode)
        run: python -m black --check src tests

      - name: isort (check mode)
        run: python -m isort --check-only src tests

      - name: Mypy (strict, scoped to src/immune_world)
        run: python -m mypy --strict src/immune_world

      - name: Pytest (smoke config; GPU tests skipped automatically)
        run: python -m pytest -q -m "not gpu"
